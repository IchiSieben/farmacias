# productos_objetivo.yaml — Canasta ancla (productos a monitorear)
#
# 34 productos de alta rotación. Cada uno se identifica por su SKU EN CADA CADENA
# (mapa `skus`). El pipeline (pipeline/build_comparativa.py) trae cada SKU con
# getObject y compara precios like-for-like.
#
#   - Inkafarma y Mifarma comparten el objectID InRetail (mismo valor en ambas).
#   - Boticas Perú usa pid propio de Salesforce; se resolvió por nombre+specs con
#     el matcher fuzzy (core.matcher) y se VERIFICÓ la presentación a mano
#     (mismo envase: 220ml ≠ 850g). Si no hay equivalente comparable en Boticas,
#     se omite la clave `boticasperu` (la tabla muestra "—", honesto).
#
# Para resolver un producto nuevo a su SKU:
#   py -m core.adapters.inkafarma  buscar "<termino>"
#   py -m core.adapters.boticasperu buscar "<termino>"

defaults:
  cadenas: [inkafarma, mifarma, boticasperu]

