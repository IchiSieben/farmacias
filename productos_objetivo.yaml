# productos_objetivo.yaml — Canasta ancla (productos a monitorear)
#
# ~30 productos de alta rotación, identificados por `sku` = objectID, que es la
# LLAVE InRetail compartida entre Inkafarma y Mifarma (mismo id = mismo producto).
# El pipeline (pipeline/build_comparativa.py) trae cada SKU en ambas cadenas con
# getObject y compara precios → match 1:1 exacto (Capa 1 del ANEXO, score 100).
#
# Cuando se sume Boticas Perú (Salesforce, sin objectID InRetail), el matcher
# resolverá por specs (principio_activo + concentración + forma) vía fuzzy.
#
# Editable: cambia/añade entradas y vuelve a correr el pipeline. Para resolver un
# producto nuevo a su SKU:  py -m core.adapters.inkafarma buscar "<termino>"

defaults:
  cadenas: [inkafarma, mifarma]

